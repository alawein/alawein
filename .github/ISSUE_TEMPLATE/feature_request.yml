name: Feature Request
description: Propose a focused improvement to the GitHub baseline, profile, or governance automation.
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the current friction or missing capability.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the preferred solution in concrete terms.
    validations:
      required: true
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - alawein control plane
        - active repo cohort
        - specific repo only
        - documentation only
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact and tradeoffs
      description: Call out expected benefits, risks, or migration cost.
  - type: checkboxes
    id: checks
    attributes:
      label: Readiness
      options:
        - label: I checked the current governance docs before filing this request.
          required: true
