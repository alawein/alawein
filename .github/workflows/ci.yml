name: CI - Documentation Contract

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Validate documentation contract (push)
        if: github.event_name == 'push'
        env:
          DOC_CONTRACT_BASE_REF: ${{ github.event.before }}
        run: ./scripts/validate-doc-contract.sh --full

      - name: Validate documentation contract (pull request)
        if: github.event_name == 'pull_request'
        run: ./scripts/validate-doc-contract.sh --changed-only "origin/${{ github.base_ref }}"

  test-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
      - name: Install pytest
        run: pip install pytest
      - name: Run script tests
        run: python -m pytest scripts/tests/ -v --tb=short

  lint-managed-markdown:
    runs-on: ubuntu-latest
    needs: validate-contract
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
      - name: Lint managed markdown
        run: |
          npx --yes markdownlint-cli@0.39.0 --config .markdownlint.jsonc \
            AGENTS.md \
            CLAUDE.md \
            CONTRIBUTING-backup-20250807.md \
            CODE_OF_CONDUCT.md \
            SECURITY.md \
            CHANGELOG.md \
            SSOT.md \
            LESSONS.md \
            DOCUMENTATION_PHILOSOPHY.md \
            docs/README.md \
            docs/governance/*.md
