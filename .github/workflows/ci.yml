name: CI - Documentation Contract

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Validate documentation contract (push)
        if: github.event_name == 'push'
        env:
          DOC_CONTRACT_BASE_REF: ${{ github.event.before }}
        run: ./scripts/validate-doc-contract.sh --full

      - name: Validate documentation contract (pull request)
        if: github.event_name == 'pull_request'
        run: ./scripts/validate-doc-contract.sh --changed-only "origin/${{ github.base_ref }}"

  test-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
      - name: Install pytest
        run: pip install pytest
      - name: Run script tests
        run: python -m pytest scripts/tests/ -v --tb=short

  lint-managed-markdown:
    runs-on: ubuntu-latest
    needs: validate-contract
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'
      - name: Lint managed markdown
        run: |
          npx --yes markdownlint-cli@0.39.0 --config .markdownlint.jsonc \
            AGENTS.md \
            CLAUDE.md \
            CODE_OF_CONDUCT.md \
            SECURITY.md \
            CHANGELOG.md \
            SSOT.md \
            LESSONS.md \
            docs/README.md \
            docs/governance/*.md
