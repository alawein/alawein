name: CI - Documentation Contract

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate documentation contract (push)
        if: github.event_name == 'push'
        env:
          DOC_CONTRACT_BASE_REF: ${{ github.event.before }}
        run: ./scripts/validate-doc-contract.sh --full

      - name: Validate documentation contract (pull request)
        if: github.event_name == 'pull_request'
        run: ./scripts/validate-doc-contract.sh --changed-only "origin/${{ github.base_ref }}"

  test-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run script tests
        run: python -m pytest scripts/tests/ -v --tb=short

  lint-managed-markdown:
    runs-on: ubuntu-latest
    needs: validate-contract
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Lint managed markdown
        run: |
          npx --yes markdownlint-cli@0.39.0 --config .markdownlint.jsonc \
            AGENTS.md \
            CLAUDE.md \
            CONTRIBUTING-backup-20250807.md \
            CODE_OF_CONDUCT.md \
            SECURITY.md \
            CHANGELOG.md \
            SSOT.md \
            LESSONS.md \
            DOCUMENTATION_PHILOSOPHY.md \
            docs/README-backup-20250807.md \
            docs/governance/*.md
