name: Claude Review Backstop

# Sweeps open PRs across the Tier-A repos and reviews any that carry no
# Claude review comment (fast-merged or opened before the gate landed).
# Dispatch-only until the manual runs prove clean; the cron comes after.
# Needs PORTFOLIO_PR_TOKEN: a fine-grained PAT with Pull requests
# read/write and Contents read on the active repos. Comment-only.

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  backstop:
    runs-on: ubuntu-latest
    steps:
      - name: Require tokens
        run: |
          if [ -z "${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}" ]; then
            echo "::error::CLAUDE_CODE_OAUTH_TOKEN is not set."
            exit 1
          fi
          if [ -z "${{ secrets.PORTFOLIO_PR_TOKEN }}" ]; then
            echo "::error::PORTFOLIO_PR_TOKEN is not set; the backstop cannot reach other repos."
            exit 1
          fi
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: anthropics/claude-code-action@f87768c6d25f92ae6efa7175e223ef77d4cbf97f # v1.0.166
        env:
          # The gh CLI inside Claude's bash needs its own auth; the
          # github_token input only feeds the action's internal tooling.
          GH_TOKEN: ${{ secrets.PORTFOLIO_PR_TOKEN }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.PORTFOLIO_PR_TOKEN }}
          show_full_output: true
          # Default permission mode denies every gh call (verified: run
          # 28906758988 ended 0/13 with "This command requires approval").
          # Grant exactly the commands the prompt uses, nothing broader.
          claude_args: --allowedTools "Bash(gh pr list:*),Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*)"
          prompt: |
            You are the portfolio review backstop. Work through these repos:
            alawein/bolts, alawein/gymboy, alawein/repz, alawein/scribd,
            alawein/veyra, alawein/attributa, alawein/llmworks,
            alawein/design-system, alawein/knowledge-base,
            alawein/workspace-tools, alawein/prompty, alawein/incore,
            alawein/alawein.

            For each repo, run `gh pr list --repo <repo> --state open` to
            enumerate open pull requests. For each open PR, check its
            comments (`gh pr view <n> --repo <repo> --comments`); if none
            contains "Claude Review" and none is authored by a claude bot,
            you MUST immediately: fetch the diff with `gh pr diff`, review
            it for correctness bugs, security issues, and obvious
            reuse/simplification gaps, and post ONE concise comment with
            `gh pr comment <n> --repo <repo> --body "..."` containing
            high-confidence findings (or stating the review found nothing).
            Post the comment for each PR before moving to the next one; do
            not defer, batch, or merely summarize. Never approve, request
            changes, or merge. Never post a duplicate on a PR that already
            has a Claude review comment. If a repo or command fails, state
            the exact error and continue. Finish with a tally: PRs found,
            reviewed, skipped, failed.
      - name: Fail on swallowed execution error
        if: always()
        run: |
          out=/home/runner/work/_temp/claude-execution-output.json
          [ -f "$out" ] || exit 0
          if jq -e '[.[] | select(.is_error == true)] | length > 0' "$out" >/dev/null; then
            echo "::error::Backstop recorded is_error; the sweep did not complete."
            exit 1
          fi
