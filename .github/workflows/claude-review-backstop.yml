name: Claude Review Backstop

# Sweeps open PRs across the Tier-A repos and reviews any that carry no
# Claude review comment (fast-merged or opened before the gate landed).
# Dispatch-only until the manual runs prove clean; the cron comes after.
# Needs PORTFOLIO_PR_TOKEN: a fine-grained PAT with Pull requests
# read/write and Contents read on the active repos. Comment-only.

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  backstop:
    runs-on: ubuntu-latest
    steps:
      - name: Require tokens
        run: |
          if [ -z "${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}" ]; then
            echo "::error::CLAUDE_CODE_OAUTH_TOKEN is not set."
            exit 1
          fi
          if [ -z "${{ secrets.PORTFOLIO_PR_TOKEN }}" ]; then
            echo "::error::PORTFOLIO_PR_TOKEN is not set; the backstop cannot reach other repos."
            exit 1
          fi
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: anthropics/claude-code-action@f87768c6d25f92ae6efa7175e223ef77d4cbf97f # v1.0.166
        env:
          # The gh CLI inside Claude's bash needs its own auth; the
          # github_token input only feeds the action's internal tooling.
          GH_TOKEN: ${{ secrets.PORTFOLIO_PR_TOKEN }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.PORTFOLIO_PR_TOKEN }}
          prompt: |
            You are the portfolio review backstop. For each of these repos:
            alawein/bolts, alawein/gymboy, alawein/repz, alawein/scribd,
            alawein/veyra, alawein/attributa, alawein/llmworks,
            alawein/design-system, alawein/knowledge-base,
            alawein/workspace-tools, alawein/prompty, alawein/incore,
            alawein/alawein - use `gh pr list` to enumerate open pull
            requests. For any open PR that has no comment containing
            "Claude Review" or authored by a claude bot, review its diff for
            correctness bugs, security issues, and obvious
            reuse/simplification gaps, then post ONE concise comment with
            high-confidence findings (or stating the review found nothing).
            Never approve, request changes, or merge. Skip PRs that already
            have a Claude review comment; never post duplicates. If a repo
            is inaccessible, say so in the run log and continue.
      - name: Fail on swallowed execution error
        if: always()
        run: |
          out=/home/runner/work/_temp/claude-execution-output.json
          [ -f "$out" ] || exit 0
          if jq -e '[.[] | select(.is_error == true)] | length > 0' "$out" >/dev/null; then
            echo "::error::Backstop recorded is_error; the sweep did not complete."
            exit 1
          fi
