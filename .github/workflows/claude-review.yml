name: Claude Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, master]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@f8a653a2073d333f0d7958a0b757a1d3fe7afde7 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          use_sticky_comment: true
          prompt: |
            Review this pull request for correctness bugs, security issues, and
            obvious reuse/simplification gaps. Be concise; report only
            high-confidence findings. Do NOT approve or merge. Post findings as
            one sticky comment.
