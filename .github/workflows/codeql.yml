name: Reusable CodeQL

on:
  workflow_call:
    inputs:
      languages:
        description: Comma-separated CodeQL language identifiers.
        required: true
        type: string
      queries:
        description: CodeQL query suites to run.
        required: false
        type: string
        default: "security-extended,security-and-quality"

permissions:
  security-events: write
  actions: read
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check code scanning availability
        id: availability
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const patterns = [
              /code scanning is not enabled/i,
              /advanced security must be enabled/i,
            ];

            try {
              await github.request("GET /repos/{owner}/{repo}/code-scanning/alerts", {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 1,
              });
              core.setOutput("enabled", "true");
            } catch (error) {
              const message = `${error.message ?? ""}`;
              const shouldSkip =
                [403, 404].includes(error.status ?? 0) &&
                patterns.some((pattern) => pattern.test(message));

              if (!shouldSkip) {
                throw error;
              }

              core.notice(
                "Code scanning is not enabled for this repository. Skipping CodeQL without failing the workflow."
              );
              core.setOutput("enabled", "false");
            }

      - uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        if: steps.availability.outputs.enabled == 'true'
        with:
          languages: ${{ inputs.languages }}
          queries: ${{ inputs.queries }}

      - uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        if: steps.availability.outputs.enabled == 'true'

      - name: CodeQL summary
        if: steps.availability.outputs.enabled != 'true'
        run: |
          echo "### CodeQL" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Skipped because code scanning is not enabled for this repository." >> "$GITHUB_STEP_SUMMARY"
