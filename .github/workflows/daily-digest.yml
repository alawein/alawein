name: Daily Digest

on:
  schedule:
    # 8am PT (UTC-8) Mon-Fri = 16:00 UTC Mon-Fri
    # Note: during PDT (UTC-7) this fires at 9am PT — adjust to 15 if needed
    - cron: '0 16 * * 1-5'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20

      - name: Build and post daily digest
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOTION_INBOX_DB_ID: ${{ secrets.NOTION_INBOX_DB_ID }}
        run: node scripts/daily-digest.mjs
