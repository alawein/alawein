name: Auto-Generate Architecture Docs

on:
  push:
    branches: [main]
    paths:
      - 'catalog/repos.json'
      - 'catalog/*.json'
      - 'catalog/skills.yaml'
      - '.github/workflows/*.yml'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-arch-diagram:
    name: Refresh architecture diagram
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Regenerate architecture repo topology
        run: python scripts/generate-arch-diagram.py

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet docs/architecture.md && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Open PR if diagram changed
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: "docs(arch): auto-update repo topology from catalog/repos.json"
          title: "[Auto] Architecture diagram refresh"
          body: |
            Auto-generated by `docs-auto-gen.yml` after a change to `catalog/repos.json`
            or workflow files.

            - Updated: `docs/architecture.md` repo topology section
            - Source: `scripts/generate-arch-diagram.py`

            Review the diff and merge if the diagram looks correct.
          branch: chore/auto-arch-update
          labels: docs,auto-generated
          delete-branch: true
