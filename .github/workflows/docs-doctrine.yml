name: Docs Doctrine

on:
  push:
    paths:
      - "docs/**"
      - "*.md"
      - "scripts/doctrine/validate-doctrine.py"
      - "scripts/doctrine/validate-topology.py"
      - "scripts/doctrine/validate-readme-topology.py"
      - "scripts/doctrine/tests/**"
      - "catalog/repos.json"
      - "scripts/ops/generate-index.sh"
      - "scripts/ops/sync-claude.sh"
      - "scripts/ops/render-configs.sh"
      - ".github/workflows/docs-doctrine.yml"
  pull_request:
    paths:
      - "docs/**"
      - "*.md"
      - "scripts/doctrine/validate-doctrine.py"
      - "scripts/doctrine/validate-topology.py"
      - "scripts/doctrine/validate-readme-topology.py"
      - "scripts/doctrine/tests/**"
      - "catalog/repos.json"
      - "scripts/ops/generate-index.sh"
      - "scripts/ops/sync-claude.sh"
      - "scripts/ops/render-configs.sh"
      - ".github/workflows/docs-doctrine.yml"
  schedule:
    # Monthly freshness audit â€” 1st of each month at 06:00 UTC
    - cron: "0 6 1 * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Doctrine Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check pytest
      - name: Run Doctrine Validator
        run: python scripts/doctrine/validate-doctrine.py --ci .
      - name: Validate catalog topology
        run: python scripts/doctrine/validate-topology.py
      - name: Validate fleet README topology (GitHub main)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/doctrine/validate-readme-topology.py --github-api
      - name: Run doctrine script tests
        run: python -m pytest scripts/doctrine/tests/ -v --tb=short

  drift-check:
    name: Derived File Drift Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Regenerate derived files
        run: |
          echo "=== generate-index.sh ==="
          bash scripts/ops/generate-index.sh .

          echo "=== render-configs.sh ==="
          bash scripts/ops/render-configs.sh

      - name: Check for drift
        run: |
          # -I'last_updated' ignores hunks whose only changed lines are the
          # last_updated stamp. generate-index.sh derives that field from
          # wall-clock / commit dates, so it churns across date boundaries
          # and checkout depths with no real content change. Structural
          # drift (a missing or renamed entry) carries non-date lines and is
          # still caught.
          if ! git diff --exit-code -I'last_updated'; then
            echo "::error::Derived files are stale. Run generators and commit."
            git diff --stat -I'last_updated'
            exit 1
          fi
          echo "All derived files are fresh (last_updated churn ignored)."
