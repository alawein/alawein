name: Docs Doctrine

on:
  push:
    paths:
      - "docs/**"
      - "*.md"
      - "scripts/validate-doctrine.py"
      - "scripts/generate-index.sh"
      - "scripts/sync-claude.sh"
      - "scripts/render-configs.sh"
      - ".github/workflows/docs-doctrine.yml"
  pull_request:
    paths:
      - "docs/**"
      - "*.md"
      - "scripts/validate-doctrine.py"
      - "scripts/generate-index.sh"
      - "scripts/sync-claude.sh"
      - "scripts/render-configs.sh"
      - ".github/workflows/docs-doctrine.yml"
  schedule:
    # Monthly freshness audit — 1st of each month at 06:00 UTC
    - cron: "0 6 1 * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Doctrine Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - name: Run Doctrine Validator
        run: python scripts/validate-doctrine.py --ci .

  drift-check:
    name: Derived File Drift Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Regenerate derived files
        run: |
          echo "=== generate-index.sh ==="
          bash scripts/generate-index.sh .

          echo "=== render-configs.sh ==="
          bash scripts/render-configs.sh

      - name: Check for drift
        run: |
          if ! git diff --exit-code; then
            echo "::error::Derived files are stale. Run generators and commit."
            git diff --stat
            exit 1
          fi
          echo "All derived files are fresh."
