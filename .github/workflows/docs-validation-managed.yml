name: Documentation Validation

on:
  push:
    branches: [main, master]
    paths:
      - '*.md'
      - '.github/workflows/docs-validation-managed.yml'
  pull_request:
    branches: [main, master]
    paths:
      - '*.md'
      - '.github/workflows/docs-validation-managed.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-docs:
    name: Validate Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install validation dependencies
        run: python -m pip install pyyaml

      - name: Fetch validate.py from alawein control plane
        run: |
          curl -fsSL \
            "https://raw.githubusercontent.com/alawein/alawein/ed5ed61aef28cbdd761eeb0654808833bc4564be/scripts/doctrine/validate.py" \
            -o validate.py

      - name: Run forbidden register check
        run: python validate.py --ci

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'

      - name: Lint managed markdown files
        run: |
          FILES=""
          for f in README.md CLAUDE.md AGENTS.md; do
            [ -f "$f" ] && FILES="$FILES $f"
          done
          if [ -n "$FILES" ]; then
            npx --yes markdownlint-cli@0.39.0 $FILES
          else
            echo "No managed markdown files found â€” skipping markdownlint."
          fi
