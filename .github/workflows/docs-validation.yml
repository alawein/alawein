name: Documentation Audit

on:
  push:
    paths:
      - 'docs/**'
      - '*.md'
      - 'catalog/**'
      - 'schemas/**'
      - 'styles/**'
      - '.vale.ini'
      - 'scripts/**'
      - '.github/workflows/docs-validation.yml'
      - '.github/markdown-link-check-config.json'
      - '.markdownlint.jsonc'
  pull_request:
    paths:
      - 'docs/**'
      - '*.md'
      - 'catalog/**'
      - 'schemas/**'
      - 'styles/**'
      - '.vale.ini'
      - 'scripts/**'
      - '.github/workflows/docs-validation.yml'
      - '.github/markdown-link-check-config.json'
      - '.markdownlint.jsonc'
  schedule:
    - cron: '0 6 * * 1' # Weekly on Monday at 6 AM

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-docs:
    name: Audit Documentation
    runs-on: ubuntu-latest
    env:
      CANONICAL_DOCS_BASE_URL: https://docs.morphism.systems
      LEGACY_DOCS_DOMAIN: docs.github-alawein.com
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Run full documentation contract validation
        env:
          DOC_CONTRACT_BASE_REF: ${{ github.event.before }}
        run: ./scripts/validate-doc-contract.sh --full

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install catalog validation dependencies
        run: python -m pip install pyyaml

      - name: Build catalog outputs and validate registry
        run: |
          python scripts/build-catalog.py --check
          python scripts/validate-catalog.py --strict

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'

      - name: Validate markdown syntax
        run: |
          npx --yes markdownlint-cli@0.39.0 --config .markdownlint.jsonc \
            AGENTS.md \
            CLAUDE.md \
            CODE_OF_CONDUCT.md \
            SECURITY.md \
            CHANGELOG.md \
            SSOT.md \
            LESSONS.md \
            docs/README.md \
            docs/governance/*.md \
            docs/style/*.md

      - name: Enforce writing voice and terminology with Vale
        uses: vale-cli/vale-action@v2.1.1
        with:
          files: '["AGENTS.md","CLAUDE.md","SECURITY.md","CHANGELOG.md","SSOT.md","LESSONS.md","README.md","docs","templates/scaffolding"]'
          reporter: github-pr-check
          fail_on_error: true
          filter_mode: nofilter

      - name: Enforce canonical docs base URL
        run: |
          echo "Canonical docs base URL: $CANONICAL_DOCS_BASE_URL"
          echo "Blocking legacy docs domain: $LEGACY_DOCS_DOMAIN"
          if grep -RIn --exclude-dir=node_modules --include="*.md" "$LEGACY_DOCS_DOMAIN" .; then
            echo "Found legacy docs domain '$LEGACY_DOCS_DOMAIN'."
            echo "Please replace it with '$CANONICAL_DOCS_BASE_URL' (or another approved Morphism Systems URL)."
            exit 1
          fi

      - name: Audit canonical names and domains
        run: |
          python3 - <<'PY'
          import json
          import re
          import sys
          from pathlib import Path

          root = Path(".")
          managed_root_docs = [
              root / "AGENTS.md",
              root / "CLAUDE.md",
              root / "CODE_OF_CONDUCT.md",
              root / "SECURITY.md",
              root / "CHANGELOG.md",
              root / "SSOT.md",
              root / "LESSONS.md",
              root / "README.md",
          ]
          managed_docs = sorted(
              p for p in (root / "docs").rglob("*.md")
              if not p.as_posix().startswith("docs/archive/")
          )
          files_to_scan = managed_root_docs + managed_docs

          legacy_tokens = [
              "gainboy",
              "MeatheadPhysicist",
              "rounaq-atelier",
              "event-discovery-framework",
          ]
          legacy_context_patterns = [
              r"legacy[_ -]?slug",
              r"migration",
              r"cutover",
              r"renamed from",
              r"retired",
              r"historical",
              r"`legacy_slugs`",
              r"→",
              r"->",
          ]

          legacy_token_exempt_prefixes = (
              "docs/governance/phase",
          )
          legacy_token_exempt_files = {
              "docs/HANDOFF-DESIGN-BRANDING.md",
              "docs/governance/branding-workflow-and-standards.md",
              "docs/governance/bulk-execution-progress.md",
              "docs/governance/design-branding-summary.md",
              "docs/governance/remaining-steps-per-repo.md",
              "docs/audits/technical-debt-report-20260311.md",
          }

          errors = []
          for file_path in files_to_scan:
              text = file_path.read_text(encoding="utf-8")
              rel_path = file_path.as_posix()
              check_legacy_tokens = (
                  rel_path not in legacy_token_exempt_files
                  and not rel_path.startswith(legacy_token_exempt_prefixes)
              )
              for line_no, line in enumerate(text.splitlines(), start=1):
                  if "repazapp.com" in line:
                      errors.append(
                          f"{file_path}:{line_no}: forbidden legacy domain 'repazapp.com'"
                      )

                  if check_legacy_tokens:
                      for token in legacy_tokens:
                          if token in line and not any(
                              re.search(pattern, line, flags=re.IGNORECASE)
                              for pattern in legacy_context_patterns
                          ):
                              errors.append(
                                  f"{file_path}:{line_no}: legacy token '{token}' outside approved alias context"
                              )

          projects = json.loads((root / "projects.json").read_text(encoding="utf-8"))
          featured = projects.get("featured", [])
          research = projects.get("research", [])

          gymboy = next((p for p in featured if p.get("repo") == "alawein/gymboy"), None)
          if gymboy is None:
              errors.append("projects.json: missing featured entry for alawein/gymboy")
          else:
              if gymboy.get("slug") != "gymboy":
                  errors.append("projects.json: alawein/gymboy must use slug 'gymboy'")
              if "gainboy" not in (gymboy.get("legacy_slugs") or []):
                  errors.append("projects.json: alawein/gymboy must retain legacy slug 'gainboy' for transition window")

          edfp = next((p for p in featured if p.get("repo") == "alawein/edfp"), None)
          if edfp is None:
              errors.append("projects.json: missing featured entry for alawein/edfp")
          else:
              if edfp.get("slug") != "edfp":
                  errors.append("projects.json: alawein/edfp must use slug 'edfp'")
              if "event-discovery-framework" not in (edfp.get("legacy_slugs") or []):
                  errors.append("projects.json: alawein/edfp must retain legacy slug 'event-discovery-framework' for transition window")

          repz = next((p for p in featured if p.get("repo") == "alawein/repz"), None)
          if repz is None or repz.get("url") != "https://repzcoach.com":
              errors.append("projects.json: featured entry for alawein/repz must use url 'https://repzcoach.com'")

          meathead = next((p for p in research if p.get("repo") == "alawein/meatheadphysicist"), None)
          if meathead is None:
              errors.append("projects.json: missing research entry for alawein/meatheadphysicist")
          else:
              if meathead.get("slug") != "meatheadphysicist":
                  errors.append("projects.json: alawein/meatheadphysicist research entry must use slug 'meatheadphysicist'")
              if meathead.get("name") != "meatheadphysicist":
                  errors.append("projects.json: alawein/meatheadphysicist research entry must use canonical name 'meatheadphysicist'")
              if "MeatheadPhysicist" not in (meathead.get("legacy_slugs") or []):
                  errors.append("projects.json: alawein/meatheadphysicist must retain legacy slug 'MeatheadPhysicist' for transition window")

          readme_text = (root / "README.md").read_text(encoding="utf-8")
          for forbidden_alias in (
              "gymboy (repo:",
              "meatheadphysicist (repo:",
              "atelier-rounaq (repo:",
              "edfp (repo:",
          ):
              if forbidden_alias in readme_text:
                  errors.append(f"README.md: obsolete alias display '{forbidden_alias}' must be removed post-cutover")

          if errors:
              print("Canonical name/domain audit failed:")
              for err in errors:
                  print(f"- {err}")
              sys.exit(1)

          print("Canonical name/domain audit passed for managed docs (docs/archive/** exempt).")
          PY

      - name: Audit external governance links
        run: |
          npx --yes markdown-link-check@3.11.2 \
            --config .github/markdown-link-check-config.json \
            AGENTS.md \
            CLAUDE.md \
            SECURITY.md \
            CHANGELOG.md \
            SSOT.md \
            docs/README.md \
            docs/governance/*.md

      - name: Generate documentation report
        run: |
          echo "# Documentation Validation Report" > docs-validation-report.md
          echo "" >> docs-validation-report.md
          echo "## Validation Results" >> docs-validation-report.md
          echo "- Documentation contract validated" >> docs-validation-report.md
          echo "- Managed markdown linted" >> docs-validation-report.md
          echo "- Legacy docs domain scan completed" >> docs-validation-report.md
          echo "- External governance links audited" >> docs-validation-report.md
          echo "" >> docs-validation-report.md
          echo "## Repository Type" >> docs-validation-report.md
          echo "- Alawein organization documentation repository" >> docs-validation-report.md
          echo "- Contains README(s), documentation, and governance artifacts" >> docs-validation-report.md
          echo "" >> docs-validation-report.md
          echo "## Generated on $(date)" >> docs-validation-report.md

      - name: Upload documentation report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: docs-validation-report
          path: docs-validation-report.md

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('docs-validation-report.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 📚 Documentation Validation Report\n\n${report}`
            });

  summary:
    name: Documentation Summary
    runs-on: ubuntu-latest
    needs: validate-docs
    if: always()
    steps:
      - name: Display summary
        run: |
          echo "## 📋 Documentation Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Results" >> $GITHUB_STEP_SUMMARY
          echo "- **Documentation Validation**: ${{ needs.validate-docs.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Notes" >> $GITHUB_STEP_SUMMARY
          echo "- This repository contains Alawein organization documentation" >> $GITHUB_STEP_SUMMARY
          echo "- Audit includes contract validation, markdown lint, canonical-name/domain checks, and external governance links" >> $GITHUB_STEP_SUMMARY
          echo "- Reports are available as artifacts for download" >> $GITHUB_STEP_SUMMARY
