name: GitHub Dashboard Sync

on:
  workflow_dispatch:
    inputs:
      owners:
        description: "Comma-separated GitHub owners to scan"
        required: false
        default: "alawein"
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  sync-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Resolve owners
        id: owners
        run: |
          if [ -n "${{ github.event.inputs.owners }}" ]; then
            echo "value=${{ github.event.inputs.owners }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ vars.DASHBOARD_OWNERS }}" ]; then
            echo "value=${{ vars.DASHBOARD_OWNERS }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ vars.GITHUB_DASHBOARD_OWNERS }}" ]; then
            echo "value=${{ vars.GITHUB_DASHBOARD_OWNERS }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=alawein" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate dashboard
        env:
          DASHBOARD_GITHUB_TOKEN: ${{ secrets.DASHBOARD_GITHUB_TOKEN }}
          GITHUB_DASHBOARD_TOKEN: ${{ secrets.GITHUB_DASHBOARD_TOKEN }}
        run: |
          if [ -z "$DASHBOARD_GITHUB_TOKEN" ] && [ -z "$GITHUB_DASHBOARD_TOKEN" ]; then
            echo "DASHBOARD_GITHUB_TOKEN secret is required."
            exit 1
          fi
          python scripts/build-github-dashboard.py \
            --owners "${{ steps.owners.outputs.value }}" \
            --output docs/dashboard \
            --retention 180

      - name: Check dashboard changes
        id: diff
        run: |
          git diff --quiet docs/dashboard && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/dashboard
          git commit -m "docs(dashboard): sync GitHub dashboard snapshots"
          git push
