name: GitHub Metadata Sync

on:
  push:
    branches: [main]
    paths:
      - 'catalog/**'
      - 'projects.json'
      - 'scripts/build-catalog.py'
      - 'scripts/catalog_lib.py'
      - 'scripts/validate-catalog.py'
      - 'scripts/sync-github-metadata.py'
      - '.github/workflows/github-metadata-sync.yml'
  pull_request:
    paths:
      - 'catalog/**'
      - 'projects.json'
      - 'scripts/build-catalog.py'
      - 'scripts/catalog_lib.py'
      - 'scripts/validate-catalog.py'
      - 'scripts/sync-github-metadata.py'
      - '.github/workflows/github-metadata-sync.yml'
  workflow_dispatch:
    inputs:
      target:
        description: Rollout target for manual runs.
        required: false
        default: canary
        type: choice
        options:
          - canary
          - cohort-1
          - repo
      repo:
        description: Repo slug to sync when target is set to repo.
        required: false
        type: string
      apply:
        description: Apply metadata changes to GitHub instead of running in advisory mode.
        required: false
        default: false
        type: boolean
      include_custom_properties:
        description: Include GitHub custom property updates.
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plan:
    name: Build sync plan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install catalog dependencies
        run: python -m pip install pyyaml

      - name: Validate catalog and derived outputs
        run: |
          python scripts/build-catalog.py --check
          python scripts/validate-catalog.py --strict

      - name: Generate sync plan artifact
        run: |
          set -euo pipefail
          args=()
          target="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target || 'all' }}"
          repo_input="${{ github.event.inputs.repo }}"
          include_custom_properties="${{ github.event.inputs.include_custom_properties != 'false' }}"

          if [ "$target" = "repo" ]; then
            if [ -z "$repo_input" ]; then
              echo "repo input is required when workflow_dispatch target=repo"
              exit 1
            fi
            args+=(--repo "$repo_input")
          elif [ "$target" = "canary" ] || [ "$target" = "cohort-1" ]; then
            args+=(--cohort "$target")
          else
            args+=(--all)
          fi

          if [ "$include_custom_properties" != "true" ]; then
            args+=(--no-custom-properties)
          fi

          python scripts/sync-github-metadata.py "${args[@]}" > github-metadata-sync-plan.json

      - name: Upload sync plan artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: github-metadata-sync-plan
          path: github-metadata-sync-plan.json

      - name: Publish workflow summary
        run: |
          echo "## GitHub metadata sync plan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Advisory mode: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.apply != 'true' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Target: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target || 'all' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Repo override: ${{ github.event.inputs.repo || 'n/a' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Custom properties: ${{ github.event.inputs.include_custom_properties != 'false' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Plan artifact: github-metadata-sync-plan" >> $GITHUB_STEP_SUMMARY

  apply:
    name: Apply metadata changes
    runs-on: ubuntu-latest
    needs: plan
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.apply == 'true' }}
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ secrets.ALAWEIN_METADATA_SYNC_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install catalog dependencies
        run: python -m pip install pyyaml

      - name: Validate sync token is available
        run: |
          set -euo pipefail
          if [ -z "$GH_TOKEN" ]; then
            echo "ALAWEIN_METADATA_SYNC_TOKEN is required for apply mode."
            exit 1
          fi
          if [ "${{ github.event.inputs.target }}" = "repo" ] && [ -z "${{ github.event.inputs.repo }}" ]; then
            echo "repo input is required when workflow_dispatch target=repo"
            exit 1
          fi

      - name: Validate catalog and derived outputs
        run: |
          python scripts/build-catalog.py --check
          python scripts/validate-catalog.py --strict

      - name: Apply metadata
        run: |
          set -euo pipefail
          args=(--apply)
          target="${{ github.event.inputs.target }}"
          repo_input="${{ github.event.inputs.repo }}"
          include_custom_properties="${{ github.event.inputs.include_custom_properties != 'false' }}"

          if [ "$target" = "repo" ]; then
            args+=(--repo "$repo_input")
          elif [ "$target" = "canary" ] || [ "$target" = "cohort-1" ]; then
            args+=(--cohort "$target")
          else
            echo "Apply mode only supports target=canary, target=cohort-1, or target=repo."
            exit 1
          fi

          if [ "$include_custom_properties" != "true" ]; then
            args+=(--no-custom-properties)
          fi

          python scripts/sync-github-metadata.py "${args[@]}" > github-metadata-sync-apply.json

      - name: Upload apply report artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: github-metadata-sync-apply
          path: github-metadata-sync-apply.json

      - name: Publish apply summary
        run: |
          echo "## GitHub metadata sync apply" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Target: ${{ github.event.inputs.target }}" >> $GITHUB_STEP_SUMMARY
          echo "- Repo override: ${{ github.event.inputs.repo || 'n/a' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Custom properties: ${{ github.event.inputs.include_custom_properties != 'false' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Apply artifact: github-metadata-sync-apply" >> $GITHUB_STEP_SUMMARY
