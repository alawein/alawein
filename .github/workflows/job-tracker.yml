name: Job Tracker Summary

on:
  schedule:
    # Daily at 9am PT (4pm UTC) Monday through Friday
    - cron: '0 16 * * 1-5'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20

      - name: Fetch Notion Engagements summary
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_ENGAGEMENTS_DB_ID: ${{ secrets.NOTION_ENGAGEMENTS_DB_ID }}
        run: node scripts/ops/job-tracker.mjs --from-notion
