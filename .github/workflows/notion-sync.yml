name: Sync to Notion

on:
  push:
    branches: [main]
    paths:
      - 'projects.json'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20

      - name: Validate projects.json contract
        run: node scripts/validate-projects-json.mjs

      - name: Sync projects to Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
          NOTION_DOMAIN_PROPERTY: Domain
          NOTION_CATEGORY_PROPERTY: Status
          NOTION_TAGS_PROPERTY: Stack
          NOTION_NAME_PROPERTY: Project Name
          NOTION_DESCRIPTION_PROPERTY: One-Liner
          NOTION_REPO_PROPERTY: Repo
        run: node scripts/sync-to-notion.mjs

      - name: Verify canonical Notion state
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
          NOTION_STATUS_PROPERTY: Status
          NOTION_NAME_PROPERTY: Project Name
          NOTION_REPO_PROPERTY: Repo
          NOTION_EXPECTED_LEGACY_COUNT: 2
        run: node scripts/verify-notion-canonical-state.mjs
