name: PAT Rotation Reminder

on:
  schedule:
    - cron: '0 9 1 */3 *'  # First day of every quarter at 09:00 UTC
  workflow_dispatch:

permissions:
  issues: write

jobs:
  remind:
    name: Create PAT rotation issue
    runs-on: ubuntu-latest
    steps:
      - name: Create rotation issue
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const today = new Date().toISOString().split('T')[0]
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Security] Quarterly PAT Rotation Due — ${today}`,
              body: [
                '## Quarterly PAT Rotation',
                '',
                'The following tokens are due for rotation:',
                '',
                '- [ ] `ALAWEIN_METADATA_SYNC_TOKEN` — used in `github-metadata-sync.yml`',
                '- [ ] `NOTION_TOKEN` — used in `daily-digest.yml`, `notion-sync.yml`',
                '',
                '### Steps',
                '',
                '1. Generate new PAT at https://github.com/settings/tokens',
                '2. Update in GitHub Settings → Environments → production (for METADATA token)',
                '3. Update repo secrets for NOTION_TOKEN',
                '4. Verify next workflow run succeeds',
                '5. Revoke old token',
                '',
                'See `docs/governance/credential-hygiene.md` for the full rotation procedure.',
              ].join('\n'),
              labels: ['security', 'maintenance'],
            })
