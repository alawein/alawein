name: Sync README

on:
  push:
    branches: [main]
    paths:
      - 'projects.json'
      - 'catalog/**'
      - 'profile-from-guides.yaml'
      - 'scripts/build-catalog.py'
      - 'scripts/catalog_lib.py'
      - 'scripts/sync-readme.py'
  pull_request:
    paths:
      - 'projects.json'
      - 'catalog/**'
      - 'profile-from-guides.yaml'
      - 'scripts/build-catalog.py'
      - 'scripts/catalog_lib.py'
      - 'scripts/sync-readme.py'
      - 'README.md'
  schedule:
    # Weekly drift audit catches upstream dependency changes that bypass the
    # path filter set above (for example, logic edits in a helper module that
    # is not on the trigger list but still affects rendered output).
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install sync dependencies
        run: python -m pip install pyyaml

      - name: Verify derived catalog outputs are up to date
        run: python scripts/build-catalog.py --check

      - name: Sync README from canonical profile and project data
        run: python scripts/sync-readme.py

      - name: Verify README sync is stable
        run: python scripts/sync-readme.py --check

      - name: Check for README drift
        id: diff
        run: |
          git diff --quiet README.md && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Capture README drift patch
        if: steps.diff.outputs.changed == 'true'
        run: |
          git diff -- README.md > readme-sync.patch

      - name: Upload README drift artifact
        if: steps.diff.outputs.changed == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: readme-sync-drift
          path: readme-sync.patch

      - name: Fail on README drift
        if: steps.diff.outputs.changed == 'true'
        run: |
          echo "README.md drift detected. Protected branch rules prevent this workflow from pushing directly to main." >> "$GITHUB_STEP_SUMMARY"
          echo "Run 'python scripts/sync-readme.py', commit the regenerated README.md, and rerun the workflow." >> "$GITHUB_STEP_SUMMARY"
          exit 1

  auto-pr:
    # Only opens a PR on the weekly schedule or manual dispatch. We intentionally
    # do NOT auto-PR on push events: push-triggered drift means a human already
    # committed inconsistent state, and we want the `sync` job's failure to
    # surface to that commit's author rather than silently opening a follow-up.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install sync dependencies
        run: python -m pip install pyyaml

      - name: Regenerate derived catalog outputs and README
        run: |
          python scripts/build-catalog.py
          python scripts/sync-readme.py

      - name: Detect drift
        id: detect
        run: |
          if git diff --quiet; then
            echo "drift=false" >> "$GITHUB_OUTPUT"
          else
            echo "drift=true" >> "$GITHUB_OUTPUT"
            git diff --stat >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Open drift-repair PR
        if: steps.detect.outputs.drift == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: 'chore(catalog): regenerate derived README and catalog outputs'
          branch: chore/readme-sync-drift
          delete-branch: true
          title: 'chore(catalog): regenerate derived README and catalog outputs'
          body: |
            Automated drift-repair PR opened by `readme-sync.yml` scheduled run.

            The weekly audit regenerated catalog outputs and/or README and
            found drift. Review the diff, then merge if the regeneration is
            correct. If the diff looks wrong, the root cause is a change in a
            helper module that needs investigation -- do not merge blindly.
          labels: |
            automation
            governance
