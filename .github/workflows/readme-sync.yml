name: Sync Catalog

on:
  push:
    branches: [main]
    paths:
      - 'projects.json'
      - 'catalog/**'
      - 'profile-from-guides.yaml'
      - 'scripts/catalog/build-catalog.py'
      - 'scripts/catalog/catalog_lib.py'
  pull_request:
    paths:
      - 'projects.json'
      - 'catalog/**'
      - 'profile-from-guides.yaml'
      - 'scripts/catalog/build-catalog.py'
      - 'scripts/catalog/catalog_lib.py'
  schedule:
    # Weekly drift audit catches upstream dependency changes that bypass the
    # path filter set above (for example, logic edits in a helper module that
    # is not on the trigger list but still affects rendered output).
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install sync dependencies
        run: python -m pip install pyyaml

      - name: Verify derived catalog outputs are up to date
        run: python scripts/catalog/build-catalog.py --check

      - name: Skip README sync (manually curated)
        run: echo "README.md is hand-curated (HTML layout, capsule-render banner, badges). Sync check skipped."

  auto-pr:
    # Only opens a PR on the weekly schedule or manual dispatch. We intentionally
    # do NOT auto-PR on push events: push-triggered drift means a human already
    # committed inconsistent state, and we want the `sync` job's failure to
    # surface to that commit's author rather than silently opening a follow-up.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install sync dependencies
        run: python -m pip install pyyaml

      - name: Regenerate derived catalog outputs
        run: |
          python scripts/catalog/build-catalog.py

      - name: Detect drift
        id: detect
        run: |
          if git diff --quiet -- ':(exclude)README.md'; then
            echo "drift=false" >> "$GITHUB_OUTPUT"
          else
            echo "drift=true" >> "$GITHUB_OUTPUT"
            git diff --stat -- ':(exclude)README.md' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Open drift-repair PR
        if: steps.detect.outputs.drift == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: 'chore(catalog): regenerate derived catalog outputs'
          branch: chore/catalog-sync-drift
          delete-branch: true
          title: 'chore(catalog): regenerate derived catalog outputs'
          body: |
            Automated drift-repair PR opened by `readme-sync.yml` scheduled run.

            The weekly audit ran `build-catalog.py` and found drift in derived
            catalog outputs. README.md is intentionally hand-curated and excluded
            from automated regeneration. Review the diff, then merge if the
            regeneration is correct. If the diff looks wrong, the root cause is a
            change in a helper module that needs investigation -- do not merge blindly.
          labels: |
            automation
            governance
