name: Sync README

on:
  push:
    branches: [main]
    paths:
      - 'projects.json'
      - 'scripts/sync-readme.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Sync README from projects.json
        run: python scripts/sync-readme.py

      - name: Verify README sync is stable
        run: python scripts/sync-readme.py --check

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet README-backup-20250807.md && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README-backup-20250807.md
          git commit -m "docs(readme): auto-sync from projects.json"
          git push
