name: Sync README

on:
  push:
    branches: [main]
    paths:
      - 'projects.json'
      - 'profile-from-guides.yaml'
      - 'scripts/sync-readme.py'
      - 'scripts/validate-projects-json.mjs'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install sync dependencies
        run: python -m pip install pyyaml

      - name: Validate curated public projects manifest
        run: node scripts/validate-projects-json.mjs

      - name: Sync README from canonical profile and project data
        run: python scripts/sync-readme.py

      - name: Verify README sync is stable
        run: python scripts/sync-readme.py --check

      - name: Check for README drift
        id: diff
        run: |
          git diff --quiet README.md && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Capture README drift patch
        if: steps.diff.outputs.changed == 'true'
        run: |
          git diff -- README.md > readme-sync.patch

      - name: Upload README drift artifact
        if: steps.diff.outputs.changed == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: readme-sync-drift
          path: readme-sync.patch

      - name: Fail on README drift
        if: steps.diff.outputs.changed == 'true'
        run: |
          echo "README.md drift detected. Protected branch rules prevent this workflow from pushing directly to main." >> "$GITHUB_STEP_SUMMARY"
          echo "Run 'python scripts/sync-readme.py', commit the regenerated README.md, and rerun the workflow." >> "$GITHUB_STEP_SUMMARY"
          exit 1
