name: Reusable Python CI

on:
  workflow_call:
    inputs:
      python-version:
        type: string
        default: '3.11'

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: 'pip'
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: pytest
