name: Secrets Scan

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 8 * * 1'  # Weekly Monday 08:00 UTC full-history scan
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # Full history on scheduled/push runs so drift across commits is
          # visible; PR events default to shallow (faster, scans only diff).
          fetch-depth: ${{ github.event_name == 'pull_request' && 1 || 0 }}

      # TODO: pin gitleaks-action to a commit SHA before merge. v2 is the
      # current major. Implementation note: the action writes a SARIF report
      # to ${{ github.workspace }}/results.sarif if GITLEAKS_ENABLE_SUMMARY is
      # set; we rely on exit code for now.
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: 'true'
          GITLEAKS_ENABLE_SUMMARY: 'true'
