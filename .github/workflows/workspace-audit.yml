name: Workspace Audit

on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly, Monday 6am UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo:
          - attributa
          - bolts
          - devkit
          - edfp
          - gymboy
          - llmworks
          - maglogic
          - meatheadphysicist
          - meshal-web
          - neper
          - qaplibria
          - qmatsim
          - qmlab
          - qubeml
          - repz
          - atelier-rounaq
          - scicomp
          - scribd
          - shared-utils
          - simcore
          - spincirc

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          repository: alawein/${{ matrix.repo }}

      - name: Check required files
        id: files
        run: |
          missing=""
          for f in README-backup-20250807.md SSOT.md AGENTS.md CLAUDE.md LICENSE SECURITY.md CODE_OF_CONDUCT.md CONTRIBUTING-backup-20250807.md; do
            [ -f "$f" ] || missing="$missing $f"
          done
          echo "missing=$missing" >> "$GITHUB_OUTPUT"
          if [ -n "$missing" ]; then
            echo "::warning::${{ matrix.repo }} missing:$missing"
          fi

      - name: Check CI workflow
        id: ci
        run: |
          if ls .github/workflows/ci.yml .github/workflows/test.yml 2>/dev/null | head -1 > /dev/null; then
            echo "has_ci=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_ci=false" >> "$GITHUB_OUTPUT"
            echo "::warning::${{ matrix.repo }} has no CI workflow"
          fi

      - name: Check test infrastructure
        id: tests
        run: |
          has_tests=false
          if [ -d tests ] || [ -d __tests__ ] || [ -d test ] || [ -d e2e ]; then
            has_tests=true
          fi
          echo "has_tests=$has_tests" >> "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          echo "## ${{ matrix.repo }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Physical repo slug: ${{ matrix.repo }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Missing files: ${{ steps.files.outputs.missing || 'none' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Has CI: ${{ steps.ci.outputs.has_ci }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Has tests: ${{ steps.tests.outputs.has_tests }}" >> "$GITHUB_STEP_SUMMARY"
