<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 20 20" shape-rendering="crispEdges">
  <!-- Background -->
  <circle cx="10" cy="10" r="10" fill="#0c1020"/>
  <circle cx="10" cy="10" r="9.5" fill="none" stroke="#00f0ff" stroke-width="0.3" opacity="0.5"/>

  <!-- Headband tail -->
  <rect x="6" y="5" width="1" height="1" fill="#ff00ff"/>
  <rect x="7" y="5" width="1" height="1" fill="#ff00ff"/>
  <rect x="5" y="6" width="1" height="1" fill="#ff00ff"/>

  <!-- Head -->
  <rect x="9" y="5" width="1" height="1" fill="#3a3a5c"/>
  <rect x="10" y="5" width="1" height="1" fill="#3a3a5c"/>
  <rect x="11" y="5" width="1" height="1" fill="#3a3a5c"/>
  <rect x="8" y="6" width="1" height="1" fill="#3a3a5c"/>
  <rect x="9" y="6" width="1" height="1" fill="#3a3a5c"/>
  <rect x="10" y="6" width="1" height="1" fill="#3a3a5c"/>
  <rect x="11" y="6" width="1" height="1" fill="#3a3a5c"/>
  <rect x="12" y="6" width="1" height="1" fill="#3a3a5c"/>

  <!-- Headband -->
  <rect x="7" y="7" width="1" height="1" fill="#ff00ff"/>
  <rect x="8" y="7" width="1" height="1" fill="#ff00ff"/>
  <rect x="9" y="7" width="1" height="1" fill="#ff00ff"/>
  <rect x="10" y="7" width="1" height="1" fill="#ff00ff"/>
  <rect x="11" y="7" width="1" height="1" fill="#ff00ff"/>
  <rect x="12" y="7" width="1" height="1" fill="#ff00ff"/>

  <!-- Eyes -->
  <rect x="8" y="8" width="1" height="1" fill="#3a3a5c"/>
  <rect x="9" y="8" width="1" height="1" fill="#00f0ff"/>
  <rect x="10" y="8" width="1" height="1" fill="#2a2a4e"/>
  <rect x="11" y="8" width="1" height="1" fill="#00f0ff"/>
  <rect x="12" y="8" width="1" height="1" fill="#3a3a5c"/>

  <!-- Lower face -->
  <rect x="9" y="9" width="1" height="1" fill="#2a2a4e"/>
  <rect x="10" y="9" width="1" height="1" fill="#2a2a4e"/>
  <rect x="11" y="9" width="1" height="1" fill="#2a2a4e"/>

  <!-- Torso -->
  <rect x="9" y="10" width="1" height="1" fill="#3a3a5c"/>
  <rect x="10" y="10" width="1" height="1" fill="#3a3a5c"/>
  <rect x="11" y="10" width="1" height="1" fill="#3a3a5c"/>
  <rect x="7" y="10" width="1" height="1" fill="#3a3a5c"/>
  <rect x="8" y="10" width="1" height="1" fill="#3a3a5c"/>
  <rect x="8" y="11" width="1" height="1" fill="#3a3a5c"/>
  <rect x="9" y="11" width="1" height="1" fill="#3a3a5c"/>
  <rect x="10" y="11" width="1" height="1" fill="#2a2a4e"/>
  <rect x="11" y="11" width="1" height="1" fill="#3a3a5c"/>
  <rect x="12" y="11" width="1" height="1" fill="#3a3a5c"/>
  <rect x="12" y="10" width="1" height="1" fill="#3a3a5c"/>
  <rect x="13" y="10" width="1" height="1" fill="#3a3a5c"/>

  <!-- Katana handle -->
  <rect x="13" y="11" width="1" height="1" fill="#4a4a6e"/>
  <rect x="13" y="12" width="1" height="1" fill="#4a4a6e"/>

  <!-- Katana blade -->
  <rect x="14" y="9" width="1" height="1" fill="#f0f000"/>
  <rect x="15" y="8" width="1" height="1" fill="#f0f000"/>
  <rect x="16" y="7" width="1" height="1" fill="#f0f000"/>
  <rect x="17" y="6" width="1" height="1" fill="#f0f000"/>

  <!-- Belt -->
  <rect x="9" y="13" width="1" height="1" fill="#4a4a6e"/>
  <rect x="10" y="13" width="1" height="1" fill="#4a4a6e"/>
  <rect x="11" y="13" width="1" height="1" fill="#4a4a6e"/>

  <!-- Legs -->
  <rect x="9" y="14" width="1" height="1" fill="#3a3a5c"/>
  <rect x="10" y="14" width="1" height="1" fill="#2a2a4e"/>
  <rect x="11" y="14" width="1" height="1" fill="#3a3a5c"/>
  <rect x="8" y="15" width="1" height="1" fill="#3a3a5c"/>
  <rect x="9" y="15" width="1" height="1" fill="#3a3a5c"/>
  <rect x="11" y="15" width="1" height="1" fill="#3a3a5c"/>
  <rect x="12" y="15" width="1" height="1" fill="#3a3a5c"/>
  <rect x="7" y="16" width="1" height="1" fill="#3a3a5c"/>
  <rect x="8" y="16" width="1" height="1" fill="#3a3a5c"/>
  <rect x="12" y="16" width="1" height="1" fill="#3a3a5c"/>
  <rect x="13" y="16" width="1" height="1" fill="#3a3a5c"/>

  <!-- Eye glow effect -->
  <rect x="9" y="8" width="1" height="1" fill="#00f0ff" opacity="0.3" filter="url(#glow)"/>
  <rect x="11" y="8" width="1" height="1" fill="#00f0ff" opacity="0.3" filter="url(#glow)"/>
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
</svg>
