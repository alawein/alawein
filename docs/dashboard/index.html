<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>GitHub Repository Dashboard</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <h1>GitHub Repository Dashboard</h1>
        <p id="meta">Loading dashboard data...</p>
      </header>
      <section class="cards" id="kpi-cards"></section>
      <section class="panel">
        <h2>Recent Releases</h2>
        <div id="recent-releases" class="stack"></div>
      </section>
      <section class="panel">
        <h2>Needs Attention</h2>
        <div id="attention-repos" class="stack"></div>
      </section>
      <section class="panel">
        <h2>Repository Breakdown</h2>
        <div class="table-wrap">
          <table id="repo-table">
            <thead>
              <tr>
                <th>Repo</th>
                <th>Status</th>
                <th>Stars</th>
                <th>Issues</th>
                <th>PRs</th>
                <th>Last Push</th>
                <th>Roadmap</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
    </main>
    <script src="./app.js" defer></script>
  </body>
</html>
