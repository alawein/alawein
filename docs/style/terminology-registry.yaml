linter_rules:
  terminology:
    message: "Use the canonical term '%s' from the terminology registry."
    level: error
    tokens:
      - gainboy
      - neper
      - qaplibria
      - epistemic-stack
      - reasonbench
      - aw-devkit
      - devkit
  tone:
    message: "Avoid promotional filler in governed docs: '%s'."
    level: error
    tokens:
      - passionate about
      - leveraging
      - innovative
      - excited to
      - it's worth noting
      - interestingly
      - delve into
      - deep dive
      - utilize
      - in today's world
      - moving forward
      - synergy
      - holistic
      - game-changing
      - groundbreaking
      - best-in-class
      - seamless
      - revolutionary
      - cutting-edge
      - robust solution
      - empower
      - transformative
      - I am pleased to
      - I hope this helps
      - feel free to
      - as mentioned above
      - next-gen
      - world-class
      - powerful
      - future-ready
  comments:
    message: "Avoid low-signal comment language: '%s'."
    level: warning
    tokens:
      - simply
      - obviously
      - easy
      - easily
      - magic
      - hack
math_notation_preferences:
  prefer_arrow: "→"
  prefer_equivalence: "≡"
  prefer_latex_in_markdown: true
  avoid_ascii_flow_arrows: true
lifecycle_labels:
  - planned
  - active
  - maintained
  - archived
forbidden_personal_claims:
  # Phrases that contradict the current canonical personal facts. Each entry
  # blocks commits on GitHub-facing surfaces (README, CLAUDE, AGENTS, prompt
  # kits) and warns on other governed docs. Update this list whenever a fact
  # changes (graduation, move, role change) — the old phrasing moves here.
  #
  # Canonical personal facts (as of 2026-04-17):
  # - PhD in EECS from UC Berkeley (awarded; not in progress)
  # - Founder, Morphism Systems (Cache Me Outside LLC)
  # - Location: San Francisco, CA
  - phrase: 'PhD candidate'
    reason: 'PhD in EECS from UC Berkeley is awarded; not a candidate.'
  - phrase: 'Ph.D. candidate'
    reason: 'PhD in EECS from UC Berkeley is awarded; not a candidate.'
  - phrase: 'Ph.D candidate'
    reason: 'PhD in EECS from UC Berkeley is awarded; not a candidate.'
  - phrase: 'finishing a PhD'
    reason: 'PhD awarded; use "PhD in EECS from UC Berkeley".'
  - phrase: 'finishing my PhD'
    reason: 'PhD awarded; use "PhD in EECS from UC Berkeley".'
  - phrase: 'pursuing a PhD'
    reason: 'PhD awarded; use "PhD in EECS from UC Berkeley".'
  - phrase: 'pursuing my PhD'
    reason: 'PhD awarded; use "PhD in EECS from UC Berkeley".'
  - phrase: 'ABD'
    reason: 'PhD awarded; not ABD.'
    word_boundary: true
