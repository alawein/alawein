    codeql_languages: []
    sync: manual
    claude_review: true

  - repo: design-system
    stack: node
    ci_template: node
    working_directory: "."
    # Matches `.github/workflows/ci.yml` install-command passed to `ci-node.yml`
    # on GitHub-hosted Linux runners (native-binding shim after npm ci).
    install_command: "npm ci && (npm install @rollup/rollup-linux-x64-gnu lightningcss-linux-x64-gnu @tailwindcss/oxide-linux-x64-gnu @esbuild/linux-x64 --no-save || true)"
    build_command: "npm run lint && npm run build"
    test_command: "npm test"
    codeql_languages:
      - javascript-typescript
    # sync: manual because ci.yml carries the Linux native-binding shim above.
    # Baseline now documents the same install line for audits and humans.
    sync: manual
    claude_review: true

  - repo: workspace-tools
    stack: python
    ci_template: python
    working_directory: "."
    install_command: "python -m pip install -e . && python -m pip install pytest ruff requests"
    build_command: "ruff check workspace_batch/ tests/ scripts/"
    test_command: "pytest tests/ -v --tb=short"
    codeql_languages:
      - python
      - javascript-typescript
    sync: auto
    claude_review: true

  - repo: knowledge-base
