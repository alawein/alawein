version: 1
workflow_ref: ed5ed61aef28cbdd761eeb0654808833bc4564be

required_files:
  - .github/dependabot.yml
  - .github/workflows/docs-validation-managed.yml

repos:
  - repo: alawein
    stack: docs
    ci_template: manual
    working_directory: "."
    install_command: ""
    build_command: ""
    test_command: ""
    codeql_languages: []
    sync: manual

  - repo: design-system
    stack: node
    ci_template: node
    working_directory: "."
    install_command: "npm ci"
    build_command: "npm run lint && npm run build"
    test_command: "npm test"
    codeql_languages:
      - javascript-typescript
    # sync: manual because ci.yml has a linux-x64 native-binding install
    # shim (@tailwindcss/oxide-linux-x64-gnu, @rollup/rollup-linux-x64-gnu,
    # lightningcss, @esbuild/linux-x64) required for Storybook builds
    # (npm/cli#4828). The baseline template does not model this extension;
    # auto-sync would strip it.
    sync: manual

  - repo: workspace-tools
    stack: python
    ci_template: python
    working_directory: "."
    install_command: "python -m pip install -e . && python -m pip install pytest ruff requests"
    build_command: "ruff check workspace_batch/ tests/ scripts/"
    test_command: "pytest tests/ -v --tb=short"
    codeql_languages:
      - python
      - javascript-typescript
    sync: auto

  - repo: knowledge-base
    stack: mixed
    ci_template: mixed
    working_directory: "."
    install_command: ""
    build_command: ""
    test_command: ""
    codeql_languages:
      - python
      - javascript-typescript
    sync: auto
    node:
      working_directory: "."
      install_command: "npm ci"
      build_command: "npm run lint && npm run build"
      test_command: "npm run build:verify"
    python:
      working_directory: "."
      install_command: "python -m pip install -r requirements.txt && python -m pip install pytest ruff detect-secrets"
      build_command: "python scripts/export-profile.py && python scripts/validate-profile-manifest.py && python scripts/validate_records.py && python scripts/generate_master_reference.py && git diff -I 'Last updated:' --exit-code MASTER_REFERENCE.md"
      test_command: "ruff check scripts/ && pytest scripts/tests/ -v --tb=short"

  - repo: adil
    stack: python
    ci_template: python
    working_directory: "."
    install_command: "python -m pip install -e .[dev]"
    build_command: "ruff check src/ && mypy src/"
    test_command: "pytest --cov=adil --cov-report=term-missing"
    codeql_languages:
      - python
    sync: auto

  - repo: alembiq
    stack: python
    ci_template: python
    working_directory: "."
    install_command: "python -m pip install -e .[dev]"
    build_command: "python -m ruff check . && python -m mypy src/alembiq/"
    test_command: "python -m pytest tests/ -v"
    codeql_languages:
      - python
    # sync: manual because ci.yml has an additional website-app job that
    # lints/tests/builds the alembiq.online marketing site in website-app/.
    # The baseline template only models the Python stack; auto-sync would
    # strip the extra job.
    sync: manual

