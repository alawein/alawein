    sync: auto
    claude_review: true
    node:
      working_directory: "."
      install_command: "npm ci"
      build_command: "npm run lint && npm run build"
      test_command: "npm run build:verify"
    python:
      working_directory: "."
      install_command: "python -m pip install -r requirements.txt && python -m pip install pytest ruff detect-secrets"
      build_command: "python scripts/export-profile.py && python scripts/validate-profile-manifest.py && python scripts/validate_records.py && python scripts/generate_master_reference.py && git diff -I 'Last updated:' --exit-code MASTER_REFERENCE.md"
      test_command: "ruff check scripts/ && pytest scripts/tests/ -v --tb=short"

